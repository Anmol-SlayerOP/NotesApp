services:
  - type: web
    name: notes-app-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build && npm run migrate
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 7d
      - key: GEMINI_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: DB_POOL_MIN
        value: 2
      - key: DB_POOL_MAX
        value: 10

databases:
  - name: notes-db
    databaseName: notes_db
    user: notes_user
    region: oregon
    plan: free
